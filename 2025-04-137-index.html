<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录注册</title>
  <!-- 引入CSS样式 -->
  <link rel="stylesheet" href="css/lab3-班号-学号后3位-index.css">
</head>
<body>
  <!-- 登录注册容器 -->
  <div class="auth-container">
    <!-- 登录表单（默认显示） -->
    <div class="login-box" id="loginBox">
      <h2>用户登录</h2>
      <div class="input-group">
        <label>用户名：</label>
        <input type="text" id="loginUsername" placeholder="请输入用户名">
      </div>
      <div class="input-group">
        <label>密&emsp;码：</label>
        <input type="password" id="loginPassword" placeholder="请输入密码">
      </div>
      <button class="btn" id="loginBtn">登录</button>
      <p class="switch-tip">还没有账号？<span id="toRegister">立即注册</span></p >
    </div>

    <!-- 注册表单（默认隐藏） -->
    <div class="register-box" id="registerBox" style="display: none;">
      <h2>用户注册</h2>
      <div class="input-group">
        <label>用户名：</label>
        <input type="text" id="regUsername" placeholder="请输入用户名">
      </div>
      <div class="input-group">
        <label>密&emsp;码：</label>
        <input type="password" id="regPassword" placeholder="请输入密码">
      </div>
      <div class="input-group">
        <label>确认密码：</label>
        <input type="password" id="regRepassword" placeholder="请再次输入密码">
      </div>
      <button class="btn" id="registerBtn">注册</button>
      <p class="switch-tip">已有账号？<span id="toLogin">去登录</span></p >
    </div>
  </div>

  <script>
    
    const loginBox = document.getElementById('loginBox');
    const registerBox = document.getElementById('registerBox');
    const toRegister = document.getElementById('toRegister');
    const toLogin = document.getElementById('toLogin');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');

 
    toRegister.addEventListener('click', () => {
      loginBox.style.display = 'none';
      registerBox.style.display = 'block';
    });


    toLogin.addEventListener('click', () => {
      registerBox.style.display = 'none';
      loginBox.style.display = 'block';
    });

    // 注册功能：存储到localStorage
    registerBtn.addEventListener('click', () => {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      const repassword = document.getElementById('regRepassword').value.trim();

      if (!username || !password || !repassword) {
        alert('请填写完整信息！');
        return;
      }
      if (password !== repassword) {
        alert('两次密码不一致！');
        return;
      }
    
      if (localStorage.getItem(username)) {
        alert('用户名已存在！');
        return;
      }
    
      localStorage.setItem(username, password);
      alert('注册成功！请登录');
     
      registerBox.style.display = 'none';
      loginBox.style.display = 'block';
    
      document.getElementById('regUsername').value = '';
      document.getElementById('regPassword').value = '';
      document.getElementById('regRepassword').value = '';
    });

    // 登录功能：和localStorage比对
    loginBtn.addEventListener('click', () => {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!username || !password) {
        alert('请填写用户名和密码！');
        return;
      }
     
      const storedPwd = localStorage.getItem(username);
      if (storedPwd && storedPwd === password) {
        alert('登录成功！');
      } else {
        alert('用户名或密码错误！');
      }
    });
  </script>
</body>
</html>
